<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office to PDF Converter</title>
    <!-- Tailwind CSS for styling, responsive design, and dark mode -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981',
                        primaryHover: '#059669',
                        secondary: '#f97316',
                        secondaryHover: '#ea580c',
                    }
                }
            }
        }
    </script>
    <style>
        .drag-active {
            border-color: #10b981 !important;
            background-color: rgba(16, 185, 129, 0.1) !important;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        @media (prefers-color-scheme: dark) {
            ::-webkit-scrollbar-thumb { background: #475569; }
        }

        /* Stili per il contenitore temporaneo HTML usato per preservare la formattazione */
        .pdf-render-container {
            font-family: Arial, sans-serif;
            color: black;
            background-color: white;
            padding: 40px;
            line-height: 1.6;
        }
        .pdf-render-container h1 { font-size: 24pt; font-weight: bold; margin-bottom: 12pt; }
        .pdf-render-container h2 { font-size: 18pt; font-weight: bold; margin-bottom: 10pt; }
        .pdf-render-container h3 { font-size: 14pt; font-weight: bold; margin-bottom: 8pt; }
        .pdf-render-container p { font-size: 11pt; margin-bottom: 10pt; }
        .pdf-render-container ul, .pdf-render-container ol { margin-bottom: 10pt; padding-left: 20pt; }
        .pdf-render-container li { font-size: 11pt; margin-bottom: 4pt; }
        .pdf-render-container strong { font-weight: bold; }
        .pdf-render-container em { font-style: italic; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

    <main class="w-full max-w-3xl bg-white dark:bg-gray-800 rounded-3xl shadow-xl overflow-hidden transition-colors duration-300">

        <!-- Header -->
        <header class="p-8 text-center border-b border-gray-100 dark:border-gray-700">
            <h1 class="text-3xl font-bold mb-2">Convert your office files to PDF</h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm">Fast, secure, and runs directly in your browser.</p>
        </header>

        <div class="p-8">
            <!-- SECTION 1: Upload Area -->
            <section id="step-upload" class="block">
                <div id="drop-zone" class="border-4 border-dashed border-gray-300 dark:border-gray-600 rounded-2xl p-12 text-center cursor-pointer hover:border-primary dark:hover:border-primary hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-all duration-200 group">
                    <input type="file" id="file-input" class="hidden" multiple accept=".doc,.docx,.xls,.xlsx,.ppt,.pptx">

                    <svg class="w-16 h-16 mx-auto mb-4 text-gray-400 group-hover:text-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>

                    <h3 class="text-xl font-semibold mb-2">Drag & Drop files here</h3>
                    <p class="text-gray-500 dark:text-gray-400">or click to browse your computer</p>
                    <p class="text-xs text-gray-400 dark:text-gray-500 mt-4">Supports Word, Excel, and PowerPoint files</p>
                </div>
            </section>

            <!-- SECTION 2: Queue / Table to convert -->
            <section id="step-queue" class="hidden flex-col gap-6">
                <h3 class="text-lg font-semibold border-b pb-2 dark:border-gray-700">Files ready for conversion</h3>

                <!-- Queue List -->
                <div id="queue-list" class="flex flex-col gap-3 max-h-64 overflow-y-auto pr-2">
                    <!-- Javascript will populate this list -->
                </div>

                <button id="btn-convert" class="w-full mt-4 bg-primary hover:bg-primaryHover text-white font-bold py-4 px-6 rounded-xl shadow-lg transform transition hover:-translate-y-0.5 active:translate-y-0">
                    Convert Now
                </button>
            </section>

            <!-- SECTION 3: Processing / Progress Bar -->
            <section id="step-processing" class="hidden py-12 text-center">
                <h3 class="text-xl font-semibold mb-6 animate-pulse" id="processing-title">Processing your documents...</h3>

                <!-- Dynamic Progress Bar -->
                <div class="flex justify-between mb-2">
                  <span class="text-sm font-medium text-gray-700 dark:text-gray-300">Progress</span>
                  <span class="text-sm font-bold text-primary" id="progress-text">0%</span>
                </div>
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-4 overflow-hidden">
                    <div class="bg-primary h-4 rounded-full transition-all duration-300 ease-out" style="width: 0%" id="progress-bar"></div>
                </div>
            </section>

            <!-- SECTION 4: Results -->
            <section id="step-results" class="hidden flex-col gap-6">
                <h3 class="text-lg font-semibold border-b pb-2 dark:border-gray-700">Conversion Complete</h3>

                <div id="results-list" class="flex flex-col gap-4 max-h-80 overflow-y-auto pr-2">
                    <!-- Javascript will populate this -->
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6">
                    <button id="btn-reset" class="w-full bg-secondary hover:bg-secondaryHover text-white font-bold py-4 px-6 rounded-xl shadow-lg transition-colors">
                        Reset
                    </button>
                    <button id="btn-download-all" class="w-full bg-primary hover:bg-primaryHover text-white font-bold py-4 px-6 rounded-xl shadow-lg transition-colors">
                        Download all documents
                    </button>
                </div>
            </section>
        </div>
    </main>

    <!-- PDF Viewer Modal Popup -->
    <div id="pdf-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm p-4 md:p-10 transition-opacity">
        <div class="bg-white dark:bg-gray-800 w-full max-w-5xl h-full rounded-2xl shadow-2xl flex flex-col overflow-hidden relative">
            <div class="flex justify-between items-center p-4 border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-900">
                <h3 id="modal-title" class="font-semibold text-lg truncate pr-4">Document Preview</h3>
                <button id="btn-close-modal" class="text-gray-500 hover:text-red-500 hover:bg-red-100 dark:hover:bg-red-900/30 p-2 rounded-full transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="flex-grow w-full h-full bg-gray-100 dark:bg-gray-800">
                <iframe id="pdf-iframe" class="w-full h-full border-0" src=""></iframe>
            </div>
        </div>
    </div>

    <!-- External Libraries -->
    <!-- MAMMOTH: Estrae il documento Word convertendolo in HTML strutturato -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>

    <!-- HTML2PDF: Genera il PDF finale a partire dall'HTML renderizzato -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- PDF.JS: Renderizza le vere miniature (thumbnail) dei PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- JSZIP & FileSaver: Per il download di massa (.zip) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <!-- Application Logic -->
    <script>
        // Configurazione del worker per PDF.js (Obbligatorio per leggere i file)
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        document.addEventListener('DOMContentLoaded', () => {
            let selectedFiles = [];
            let convertedPdfs = [];

            const stepUpload = document.getElementById('step-upload');
            const stepQueue = document.getElementById('step-queue');
            const stepProcessing = document.getElementById('step-processing');
            const stepResults = document.getElementById('step-results');

            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');
            const queueList = document.getElementById('queue-list');
            const resultsList = document.getElementById('results-list');

            const btnConvert = document.getElementById('btn-convert');
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const processingTitle = document.getElementById('processing-title');
            const btnReset = document.getElementById('btn-reset');
            const btnDownloadAll = document.getElementById('btn-download-all');

            const modal = document.getElementById('pdf-modal');
            const btnCloseModal = document.getElementById('btn-close-modal');
            const pdfIframe = document.getElementById('pdf-iframe');
            const modalTitle = document.getElementById('modal-title');

            const showStep = (stepElement) => {
                [stepUpload, stepQueue, stepProcessing, stepResults].forEach(el => el.classList.add('hidden'));
                [stepUpload, stepQueue, stepProcessing, stepResults].forEach(el => el.classList.remove('flex', 'block'));
                if(stepElement === stepUpload) stepElement.classList.add('block');
                else stepElement.classList.add('flex');
                stepElement.classList.remove('hidden');
            };

            // Drag & Drop
            dropZone.addEventListener('click', () => fileInput.click());
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
            });
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-active'), false);
            });
            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-active'), false);
            });
            dropZone.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files));
            fileInput.addEventListener('change', function() { handleFiles(this.files); });

            function handleFiles(files) {
                if (files.length === 0) return;
                for(let i=0; i < files.length; i++) selectedFiles.push(files[i]);
                renderQueue();
                showStep(stepQueue);
            }

            // Identificazione Formato File per icone/colori in tabella
            function getFileConfig(filename) {
                const ext = filename.split('.').pop().toLowerCase();
                if (['doc', 'docx'].includes(ext)) {
                    return {
                        colorClass: 'text-blue-500',
                        bgClass: 'bg-blue-100 dark:bg-blue-900/30',
                        icon: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>`
                    };
                } else if (['xls', 'xlsx'].includes(ext)) {
                    return {
                        colorClass: 'text-green-500',
                        bgClass: 'bg-green-100 dark:bg-green-900/30',
                        icon: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>`
                    };
                } else if (['ppt', 'pptx'].includes(ext)) {
                    return {
                        colorClass: 'text-orange-500',
                        bgClass: 'bg-orange-100 dark:bg-orange-900/30',
                        icon: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>`
                    };
                }
                return {
                    colorClass: 'text-gray-500',
                    bgClass: 'bg-gray-100 dark:bg-gray-700',
                    icon: `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>`
                };
            }

            function renderQueue() {
                queueList.innerHTML = '';
                if(selectedFiles.length === 0) return showStep(stepUpload);

                selectedFiles.forEach((file, index) => {
                    const config = getFileConfig(file.name);
                    const item = document.createElement('div');
                    item.className = "flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg border border-gray-100 dark:border-gray-600";

                    item.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="p-2 rounded-lg ${config.bgClass} ${config.colorClass} shrink-0">
                                ${config.icon}
                            </div>
                            <span class="font-medium truncate text-sm md:text-base">${file.name}</span>
                        </div>
                        <button class="text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 p-2 rounded-full transition-colors" onclick="removeFile(${index})">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    `;
                    queueList.appendChild(item);
                });
            }

            window.removeFile = (index) => { selectedFiles.splice(index, 1); renderQueue(); };

            // ESTRAZIONE STRUTTURATA HTML TRAMITE MAMMOTH (Mantiene la formattazione)
            function extractHtmlFromDocx(file) {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        mammoth.convertToHtml({ arrayBuffer: event.target.result })
                            .then(result => resolve(result.value))
                            .catch(() => resolve("<p>Error reading file offline.</p>"));
                    };
                    reader.readAsArrayBuffer(file);
                });
            }

            // FUNZIONE CENTRALE: Da HTML a PDF usando html2pdf (Mantiene l'estetica)
            async function createPdfFromHtml(htmlContent, filename) {
                // RISOLTO BUG PAGINA BIANCA: Non inseriamo l'elemento nel DOM nascosto con '-9999px'.
                // Passiamo direttamente una stringa HTML ben formattata a html2pdf.
                // Includiamo gli stili direttamente qui dentro affinché html2pdf li legga nel suo iframe isolato.
                const fullHtml = `
                    <div style="font-family: Arial, sans-serif; color: black; line-height: 1.6; padding: 20px;">
                        <style>
                            h1 { font-size: 24pt; font-weight: bold; margin-bottom: 12pt; page-break-after: avoid; }
                            h2 { font-size: 18pt; font-weight: bold; margin-bottom: 10pt; page-break-after: avoid; }
                            h3 { font-size: 14pt; font-weight: bold; margin-bottom: 8pt; page-break-after: avoid; }
                            p { font-size: 11pt; margin-bottom: 10pt; page-break-inside: avoid; }
                            ul, ol { margin-bottom: 10pt; padding-left: 20pt; }
                            li { font-size: 11pt; margin-bottom: 4pt; page-break-inside: avoid; }
                            table { width: 100%; border-collapse: collapse; margin-bottom: 10pt; page-break-inside: auto; }
                            tr { page-break-inside: avoid; page-break-after: auto; }
                            td, th { border: 1px solid #ddd; padding: 8px; }
                        </style>
                        ${htmlContent}
                    </div>
                `;

                const opt = {
                    margin:       [15, 15, 15, 15], // Margini uniformi
                    filename:     filename,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] } // Aiuta l'impaginazione su più fogli
                };

                // html2pdf processa direttamente la stringa HTML senza subire limitazioni visive dal DOM
                const worker = html2pdf().set(opt).from(fullHtml);
                const pdfBlob = await worker.outputPdf('blob');

                return pdfBlob;
            }

            // --- PROCESSO DI CONVERSIONE PRINCIPALE ---
            btnConvert.addEventListener('click', async () => {
                showStep(stepProcessing);
                progressBar.style.width = '0%';
                progressText.innerText = '0%';
                convertedPdfs = [];

                const total = selectedFiles.length;

                for (let i = 0; i < total; i++) {
                    const file = selectedFiles[i];
                    processingTitle.innerText = `Processing: ${file.name}...`;

                    const ext = file.name.split('.').pop().toLowerCase();
                    const originalNameWithoutExt = file.name.split('.').slice(0, -1).join('.');
                    const newFileName = `${originalNameWithoutExt}.pdf`;

                    let htmlContent = "";

                    if (ext === 'docx') {
                        // 1. Estrazione in formato intermedio HTML
                        const rawHtml = await extractHtmlFromDocx(file);
                        htmlContent = rawHtml ? rawHtml : "<p>Document is empty or could not be read offline.</p>";
                    } else {
                        // Per Excel/PowerPoint: Generiamo un bel template HTML per l'avviso
                        htmlContent = `
                            <h1 style="color: #ef4444;">Offline Conversion Limitation</h1>
                            <p>The file <strong>"${file.name}"</strong> is an Excel/PowerPoint format.</p>
                            <p>True offline conversion of these complex formats into PDF inside a browser without a backend server is not technically possible using only pure Javascript.</p>
                            <p><em>In a real-world production scenario, this application would securely send this file to a server via API, and the server would return the perfectly formatted PDF.</em></p>
                        `;
                    }

                    // 2. Da HTML a PDF mantenendo il layout
                    const pdfBlob = await createPdfFromHtml(htmlContent, newFileName);

                    convertedPdfs.push({
                        name: newFileName,
                        blob: pdfBlob,
                        url: URL.createObjectURL(pdfBlob)
                    });

                    // Update UI Progress smoothly
                    const percentComplete = Math.round(((i + 1) / total) * 100);
                    progressBar.style.width = `${percentComplete}%`;
                    progressText.innerText = `${percentComplete}%`;

                    await new Promise(r => setTimeout(r, 400));
                }

                processingTitle.innerText = "Done!";
                setTimeout(() => {
                    renderResults();
                    showStep(stepResults);
                }, 500);
            });

            // GESTIONE DELLE VERE MINIATURE TRAMITE PDF.JS
            async function generateThumbnail(pdfUrl, canvasId) {
                try {
                    const canvas = document.getElementById(canvasId);
                    if(!canvas) return;

                    const loadingTask = pdfjsLib.getDocument(pdfUrl);
                    const pdf = await loadingTask.promise;

                    // Prendi la prima pagina
                    const page = await pdf.getPage(1);

                    // Calcola la scala per rimpicciolire l'immagine
                    const viewport = page.getViewport({scale: 0.3});

                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport
                    };
                    await page.render(renderContext).promise;
                } catch (error) {
                    console.error("Errore durante la generazione della miniatura: ", error);
                }
            }

            function renderResults() {
                resultsList.innerHTML = '';
                convertedPdfs.forEach((pdf, index) => {
                    const row = document.createElement('div');
                    row.className = "flex items-center justify-between p-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-xl shadow-sm hover:shadow-md transition-shadow";

                    const canvasId = `thumb-canvas-${index}`;

                    // Creazione della zona miniatura (Thumbnail)
                    const thumb = document.createElement('div');
                    thumb.className = "w-12 h-16 bg-gray-100 dark:bg-gray-700 rounded border dark:border-gray-600 flex items-center justify-center cursor-pointer shrink-0 hover:border-primary dark:hover:border-primary transition-colors relative group overflow-hidden";
                    thumb.innerHTML = `
                        <!-- Il canvas che ospiterà l'immagine reale del PDF -->
                        <canvas id="${canvasId}" class="w-full h-full object-cover"></canvas>

                        <!-- Overlay scuro con icona 'apri' al passaggio del mouse -->
                        <div class="absolute inset-0 bg-black/40 hidden group-hover:flex items-center justify-center transition-opacity">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </div>
                    `;
                    thumb.onclick = () => openModal(pdf.url, pdf.name);

                    const nameContainer = document.createElement('div');
                    nameContainer.className = "flex-grow px-4 overflow-hidden";
                    nameContainer.innerHTML = `<span class="font-medium truncate block text-sm md:text-base">${pdf.name}</span>`;

                    const downloadBtn = document.createElement('a');
                    downloadBtn.href = pdf.url;
                    downloadBtn.download = pdf.name;
                    downloadBtn.className = "bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-white p-2 md:px-4 md:py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors shrink-0";
                    downloadBtn.innerHTML = `
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        <span class="hidden md:inline">Download</span>
                    `;

                    row.appendChild(thumb);
                    row.appendChild(nameContainer);
                    row.appendChild(downloadBtn);
                    resultsList.appendChild(row);

                    // Lanciamo il render dell'anteprima in background dopo averlo aggiunto al DOM
                    setTimeout(() => generateThumbnail(pdf.url, canvasId), 50);
                });
            }

            btnReset.addEventListener('click', () => {
                selectedFiles = [];
                convertedPdfs.forEach(pdf => URL.revokeObjectURL(pdf.url));
                convertedPdfs = [];
                fileInput.value = '';
                showStep(stepUpload);
            });

            btnDownloadAll.addEventListener('click', () => {
                if(convertedPdfs.length === 0) return;
                const zip = new JSZip();
                convertedPdfs.forEach(pdf => zip.file(pdf.name, pdf.blob));
                zip.generateAsync({type:"blob"}).then(content => saveAs(content, "Converted_documents.zip"));
            });

            function openModal(pdfUrl, title) {
                modalTitle.innerText = title;
                pdfIframe.src = pdfUrl;
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                pdfIframe.src = '';
                document.body.style.overflow = '';
            }

            btnCloseModal.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
        });
    </script>
</body>
</html>
